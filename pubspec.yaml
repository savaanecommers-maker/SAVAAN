name: savaan
description: "Luxury and Trust"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.0

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  http: ^1.2.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  flutter_map: ^7.0.2          # interactive OSM map — no API key needed
  latlong2: ^0.9.0             # LatLng type used by flutter_map
  geolocator: ^13.0.2          # GPS current location
  cached_network_image: ^3.4.1  # robust network image loading with cache + error handling
  image_picker: ^1.1.2          # photo upload from gallery / camera
  share_plus: ^10.0.0           # native share sheet
  flutter_html: ^3.0.0-beta.2   # render HTML product descriptions
  cashfree_pg: ^3.0.0           # Cashfree payment gateway SDK

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/topleft.png
    - assets/bottomright.png
    - assets/splashscreeenWave.png
